aid: taxnexus
name: TaxNexus
description: >
  TaxNexus is a cannabis tax compliance REST API and financial technology service
  that automates calculation of state, county, and local cannabis excise taxes across
  supported jurisdictions including California and Oregon. Cannabis POS and ERP
  software developers can integrate with the TaxNexus API to calculate excise taxes,
  track and store tax data, and file monthly cannabis tax returns. The platform serves
  cannabis businesses, software makers, and accountants seeking to automate real-world
  cannabis tax compliance problems for recreational and medical cannabis taxpayers.
